<aside class="left-column">

  <section class="panel team-panel">

    <div class="panel-heading">
      <div>
        <span>Visualização</span>
        <h2>Equipes na pista</h2>
      </div>

      <button id="reset-teams" type="button">
        Limpar
      </button>
    </div>

    <label class="team-option all-option">
      <input id="toggle-all" type="checkbox" checked />
      <span class="fake-check"></span>
      <strong>Todos os pilotos</strong>
    </label>

    <div id="team-list" class="team-list"></div>

    <div class="mode-switch">
      <button id="mode-dim" class="active" type="button">
        Apagar não selecionados
      </button>

      <button id="mode-hide" type="button">
        Ocultar
      </button>
    </div>

  </section>

  <section class="panel standings-panel">

    <div class="table-title">
      Classificação
    </div>

    <div class="standings-head">
      <span>POS</span>
      <span>PILOTO</span>
      <span>DIF.</span>
      <span>PNEU</span>
    </div>

    <div id="standings-list" class="standings-list"></div>

  </section>

</aside>
