<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Replay histórico | F1 Historical Intelligence</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./styles-platform.css" />
</head>

<body data-page="replay">
  <div data-component="./components/floating-menu.html"></div>

  <main class="app-shell">
    <div data-component="./components/header.html"></div>
    <div data-component="./components/top-metrics.html"></div>

    <section id="page-replay" class="platform-page is-active">
      <section class="main-dashboard">
        <div data-component="./components/left-column.html"></div>
        <div data-component="./components/track-map.html"></div>
        <div data-component="./components/driver-panel.html"></div>
      </section>

      <div data-component="./components/footer-status.html"></div>
    </section>
  </main>

  <script type="module">
    async function loadComponent(node) {
      const path = node.getAttribute('data-component');
      const response = await fetch(path);
      if (!response.ok) throw new Error(`Erro ao carregar componente: ${path}`);
      node.outerHTML = await response.text();
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.defer = true;
        script.onload = resolve;
        script.onerror = () => reject(new Error(`Erro ao carregar ${src}`));
        document.body.appendChild(script);
      });
    }

    try {
      await Promise.all(Array.from(document.querySelectorAll('[data-component]')).map(loadComponent));
      await loadScript('./js/floating-menu.js');
      await loadScript('./js/local-database.js');
      await loadScript('./js/openf1-utils.js');
      await loadScript('./js/openf1-api.js');
      await loadScript('./js/openf1-renderers.js');
      await loadScript('./script.js');
    } catch (error) {
      document.body.innerHTML = `<pre style="color:white;background:#050b12;padding:24px;font-family:monospace;white-space:pre-wrap">Erro ao carregar o visualizador:\n${error.stack || error.message}</pre>`;
      console.error(error);
    }
  </script>
</body>
</html>
